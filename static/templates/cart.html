{% extends "base.html" %}
{% block content %}

<h2>Your Cart</h2>

{% if products %}
<table>
    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.name }}</td>
        <td>₹ {{ product.price }}</td>
        <td>{{ product.quantity }}</td>
    </tr>
    {% endfor %}
</table>

<h3>Total: ₹ {{ total }}</h3>

<a href="{{ url_for('checkout') }}" class="btn">Checkout</a>

{% else %}
<p>Your cart is empty.</p>
{% endif %}

{% endblock %}
